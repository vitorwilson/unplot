<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>unplot</title>
    <style>
      /* Critical background so a reload never flashes the wrong color before
         styles.css loads (paired with the theme bootstrap below). */
      html {
        background: #f5f6f8;
      }
      html[data-theme="dark"] {
        background: #0f1115;
      }
    </style>
    <script>
      // Set the theme before first paint so a reload doesn't flash the default
      // palette (FOUC). Mirrors resolveInitialTheme() in src/theme.ts.
      (function () {
        try {
          var stored = localStorage.getItem("unplot-theme");
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute(
            "data-theme",
            dark ? "dark" : "light",
          );
        } catch (e) {
          /* localStorage/matchMedia unavailable — theme.ts will set it later. */
        }
      })();
    </script>
    <!-- Load styles render-blocking so a reload never flashes unstyled layout
         before the JS module runs (Vite bundles this in the build). -->
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <button
      id="theme-toggle"
      type="button"
      aria-label="Toggle color theme"
    ></button>
    <main>
      <h1>unplot</h1>
      <p class="tagline">Draw a function; get the math.</p>
      <canvas id="plane"></canvas>
      <div class="actions">
        <button id="done-btn" type="button">Done — show the math</button>
        <button id="dx-btn" type="button">d/dx</button>
        <button id="integral-btn" type="button">∫ dx</button>
        <button id="calc-reset-btn" type="button" hidden>
          Reset to drawing
        </button>
        <button id="open-btn" type="button">Open</button>
        <button id="save-btn" type="button">Save</button>
      </div>
      <section id="points-panel" class="points-panel">
        <button id="points-toggle" class="points-toggle" type="button"></button>
        <div id="points-body" class="points-body" hidden>
          <textarea
            id="points-input"
            class="points-input"
            spellcheck="false"
            rows="6"
            placeholder="x, y — one point per line&#10;0, 0&#10;1, 2"
          ></textarea>
          <div class="points-footer">
            <button id="points-plot" type="button">Plot points</button>
            <span
              id="points-message"
              class="points-message"
              aria-live="polite"
            ></span>
          </div>
        </div>
      </section>
      <section id="latex-panel" class="latex-panel" hidden>
        <div id="latex-approx" class="latex-approx" hidden>
          <div class="latex-approx-head">
            <div id="latex-approx-math" class="latex-approx-math"></div>
            <button id="latex-approx-copy" class="latex-copy" type="button">
              Copy
            </button>
          </div>
          <div id="latex-approx-error" class="latex-approx-error"></div>
        </div>
        <div class="latex-header">
          <button
            id="latex-summary"
            class="latex-summary"
            type="button"
          ></button>
          <select
            id="latex-format"
            class="latex-format"
            aria-label="Copy format"
            hidden
          >
            <option value="latex">LaTeX</option>
            <option value="desmos">Desmos</option>
            <option value="wolfram">Wolfram</option>
          </select>
          <button id="latex-copy" class="latex-copy" type="button" hidden>
            Copy LaTeX
          </button>
        </div>
        <div id="latex-body" class="latex-body" hidden>
          <div id="latex-math"></div>
        </div>
      </section>
      <p class="hint" id="controls-hint"></p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

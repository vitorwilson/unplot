name: Release

# Triggered only by a version tag (pushed by bin/deploy), never by hand. Builds
# the signed Tauri bundles on each platform and attaches them to a draft GitHub
# Release whose body is the tag's CHANGELOG section (docs/RELEASE.md).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # One universal binary covers Apple Silicon and Intel (.dmg/.app).
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin,x86_64-apple-darwin"
          # 22.04's older glibc/WebKitGTK widens the .deb/.AppImage compatibility.
          - platform: ubuntu-22.04
            args: ""
            rust-targets: ""
          - platform: windows-latest
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            squashfs-tools

      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@v2

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # The tag's CHANGELOG section becomes the GitHub Release body.
      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          {
            echo 'body<<CHANGELOG_EOF'
            bash bin/changelog "${GITHUB_REF_NAME#v}"
            echo CHANGELOG_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Builds are intentionally UNSIGNED — the project does not use paid
          # code-signing certificates (see docs/RELEASE.md), so no Apple/Windows
          # signing or notarization secrets are passed. Passing empty cert vars
          # makes tauri-action attempt (and fail) signing, so they are omitted.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "unplot ${{ github.ref_name }}"
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # linuxdeploy bundles the build machine's libwayland-*/libepoxy into the
      # AppImage, where they shadow the user's Mesa stack and make WebKitGTK abort
      # with "Could not create default EGL display: EGL_BAD_PARAMETER" on newer
      # hosts. Strip them so they resolve to the running system, then replace the
      # asset tauri-action just uploaded. Swapping the bytes is safe: no updater
      # signature exists (createUpdaterArtifacts is off). See docs/linux-packaging.md.
      - name: Fix AppImage host GL libraries
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t appimages < <(find . -path '*/bundle/appimage/*.AppImage' 2>/dev/null)
          appimage="${appimages[0]:-}"
          [ -n "$appimage" ] || { echo "no AppImage produced under target/"; exit 1; }
          bin/unbundle-appimage-gl "$appimage"
          gh release upload "${GITHUB_REF_NAME}" "$appimage" --clobber

name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Frontend toolchain ---
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      # --- Frontend checks. `pnpm build` produces dist/, which the Tauri crate
      # embeds at compile time, so it must run before the Rust checks below. ---
      - name: Prettier (check)
        run: pnpm format:check
      - name: ESLint
        run: pnpm lint
      - name: Vitest
        run: pnpm test
      - name: Build frontend
        run: pnpm build

      # --- Rust toolchain + Tauri's Linux system dependencies ---
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev

      # --- Rust checks ---
      - name: cargo fmt (check)
        run: cargo fmt --check
      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: cargo test
        run: cargo test

      # --- Security / dependency audits ---
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit
      - name: pnpm audit
        run: pnpm audit --audit-level high
